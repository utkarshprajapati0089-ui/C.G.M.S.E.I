<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .login-box {
            width: 350px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            text-align: center;
            color: white;
        }

        .login-box h2 {
            margin-bottom: 20px;
        }

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        .input-box input {
            width: 100%;
            padding: 10px;
            border: none;
            outline: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .input-box input::placeholder {
            color: #ddd;
        }

        .login-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #ff7eb3;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            background: #ff4e8a;
        }

        .extra {
            margin-top: 15px;
            font-size: 14px;
        }

        .extra a {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Student Login</h2>

        <form>
            <div class="input-box">
                <input type="text" placeholder="Student ID" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>

<div style="text-align:center;background-color:pink;"><a style="font-size:20px; background-color:dark pink; padding: 10px 35px 10px 35px;color:white; " href="cgmsei.html">login</a>
</div>
            <div class="extra">
                <p>Forgot password? <a href="#">Click here</a></p>
            </div>
        </form>
    </div>

</body>
</html>
